name: Retrain

on:
  workflow_dispatch:        # bouton manuel "Run workflow"
  schedule:
    - cron: "0 3 * * 1"     # automatique : chaque lundi a 03h00 UTC

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Reentrainer (champion / challenger)
        run: python retrain/retrain.py
      - name: Archiver le modele et les metriques
        uses: actions/upload-artifact@v4
        with:
          name: churn-model
          if-no-files-found: ignore
          path: |
            models/churn_model.joblib
            models/metrics.json
            retrain/retrain_log.csv