services:
  warehouse:
    image: postgres:16
    container_name: soluna_warehouse
    environment:
      POSTGRES_USER: soluna
      POSTGRES_PASSWORD: soluna
      POSTGRES_DB: soluna
    ports:
      - "5432:5432"
    volumes:
      - warehouse_data:/var/lib/postgresql/data
      - ./data:/data:ro
      - ./sql:/sql:ro

  adminer:
    image: adminer:4
    container_name: soluna_adminer
    ports:
      - "8080:8080"
    depends_on:
      - warehouse

  kafka:
    image: apache/kafka:3.8.0
    container_name: soluna_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  airflow:
    image: apache/airflow:2.9.3
    container_name: soluna_airflow
    depends_on:
      - warehouse
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: psycopg2-binary
    volumes:
      - ./dags:/opt/airflow/dags
    command: standalone

volumes:
  warehouse_data: